<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALIFE — Artificial Life Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #050810;
      --panel:     #090d1a;
      --border:    #1a2240;
      --accent1:   #00ffe7;
      --accent2:   #ff4fcb;
      --accent3:   #ffe44f;
      --dim:       #3a4a6a;
      --text:      #c8d8f8;
      --text-dim:  #4a6080;
      --danger:    #ff4f4f;
      --success:   #4fff9f;
      --font-mono: 'Share Tech Mono', monospace;
      --font-head: 'Orbitron', sans-serif;
      --panel-radius: 6px;
      --glow1: 0 0 12px #00ffe766, 0 0 28px #00ffe722;
      --glow2: 0 0 12px #ff4fcb66, 0 0 28px #ff4fcb22;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      height: 100vh;
      display: grid;
      grid-template-rows: 52px 1fr;
      grid-template-columns: 280px 1fr;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      position: relative;
      z-index: 10;
    }
    header h1 {
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 6px;
      color: var(--accent1);
      text-shadow: var(--glow1);
    }
    header .tag {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 2px;
    }
    .header-stats {
      margin-left: auto;
      display: flex;
      gap: 24px;
      font-size: 10px;
      color: var(--text-dim);
    }
    .header-stats span { color: var(--accent1); }
    #stat-gen, #stat-pop, #stat-fps { color: var(--accent3); }

    /* ── LEFT PANEL ── */
    #panel {
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    #panel::-webkit-scrollbar { width: 4px; }
    #panel::-webkit-scrollbar-track { background: var(--bg); }
    #panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .section {
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
    }
    .section-title {
      font-family: var(--font-head);
      font-size: 8px;
      letter-spacing: 3px;
      color: var(--text-dim);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Algorithm selector */
    .algo-list { display: flex; flex-direction: column; gap: 6px; }
    .algo-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 9px 12px;
      border-radius: var(--panel-radius);
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }
    .algo-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .algo-btn:hover { border-color: var(--dim); color: var(--text); }
    .algo-btn.active {
      border-color: var(--accent1);
      color: var(--accent1);
      text-shadow: var(--glow1);
      box-shadow: inset 0 0 20px #00ffe708, var(--glow1);
    }
    .algo-btn.active::before { background: #00ffe70a; opacity: 1; }
    .algo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--dim);
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .algo-btn.active .algo-dot {
      background: var(--accent1);
      box-shadow: 0 0 8px var(--accent1);
    }
    .algo-label { flex: 1; }
    .algo-key {
      font-size: 9px;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 2px;
    }

    /* Transport controls */
    .transport { display: flex; gap: 8px; }
    .btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 8px 4px;
      border-radius: var(--panel-radius);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 1px;
    }
    .btn:hover { border-color: var(--dim); color: var(--text); }
    .btn.primary {
      border-color: var(--accent1);
      color: var(--accent1);
      box-shadow: var(--glow1);
    }
    .btn.primary:hover { background: #00ffe710; }
    .btn.danger {
      border-color: var(--danger);
      color: var(--danger);
    }
    .btn.danger:hover { background: #ff4f4f10; }

    /* Speed / sliders */
    .param-row {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 12px;
    }
    .param-row:last-child { margin-bottom: 0; }
    .param-label {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-dim);
    }
    .param-label .val { color: var(--accent3); }
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent1);
      box-shadow: 0 0 8px var(--accent1);
      cursor: pointer;
    }

    /* Dynamic params */
    #algo-params { display: flex; flex-direction: column; gap: 0; }

    /* Canvas area */
    #canvas-wrap {
      position: relative;
      background: #020408;
      overflow: hidden;
    }
    #canvas-wrap canvas {
      position: absolute;
      top: 0; left: 0;
    }
    #bg-canvas { z-index: 0; opacity: 0.4; }
    #main-canvas { z-index: 1; }

    /* Overlay on canvas */
    #algo-badge {
      position: absolute;
      top: 16px; left: 16px;
      z-index: 10;
      background: #090d1acc;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 12px;
      font-family: var(--font-head);
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--accent1);
      text-shadow: var(--glow1);
      backdrop-filter: blur(4px);
    }
    #paused-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      background: #05081088;
      backdrop-filter: blur(2px);
    }
    #paused-overlay.visible { display: flex; }
    #paused-overlay span {
      font-family: var(--font-head);
      font-size: 32px;
      letter-spacing: 12px;
      color: var(--accent2);
      text-shadow: var(--glow2);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Tooltip / legend */
    #legend {
      position: absolute;
      bottom: 16px; right: 16px;
      z-index: 10;
      background: #090d1acc;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 14px;
      font-size: 10px;
      color: var(--text-dim);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 140px;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Scanline overlay */
    #canvas-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        #00000018 2px,
        #00000018 4px
      );
      pointer-events: none;
      z-index: 5;
    }

    /* scrollbar for panel */
    .param-group {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    /* click hint */
    #click-hint {
      position: absolute;
      bottom: 16px; left: 16px;
      z-index: 10;
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 1px;
      background: #090d1acc;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 10px;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>

<header>
  <h1>ALIFE</h1>
  <div class="tag">ARTIFICIAL LIFE SIMULATOR</div>
  <div class="tag">v1.0</div>
  <div class="header-stats">
    <div>GEN <span id="stat-gen">0</span></div>
    <div>POP <span id="stat-pop">0</span></div>
    <div>FPS <span id="stat-fps">0</span></div>
  </div>
</header>

<div id="panel">

  <!-- Algorithm Selector -->
  <div class="section">
    <div class="section-title">ALGORITHM</div>
    <div class="algo-list" id="algo-list"></div>
  </div>

  <!-- Transport -->
  <div class="section">
    <div class="section-title">TRANSPORT</div>
    <div class="transport" style="margin-bottom:10px">
      <button class="btn primary" id="btn-play">▶ PLAY</button>
      <button class="btn" id="btn-step">STEP</button>
      <button class="btn danger" id="btn-reset">RESET</button>
    </div>
    <div class="param-row">
      <div class="param-label">SPEED <span class="val" id="speed-val">10</span> fps</div>
      <input type="range" id="speed-slider" min="1" max="60" value="10" />
    </div>
  </div>

  <!-- Global params (always shown) -->
  <div class="param-group">
    <div class="section-title">WORLD</div>
    <div class="param-row">
      <div class="param-label">POPULATION <span class="val" id="pop-val">150</span></div>
      <input type="range" id="pop-slider" min="10" max="500" value="150" />
    </div>
  </div>

  <!-- Dynamic algo params injected here -->
  <div id="algo-params"></div>

</div>

<!-- Canvas viewport -->
<div id="canvas-wrap">
  <canvas id="bg-canvas"></canvas>
  <canvas id="main-canvas"></canvas>
  <div id="algo-badge">CONWAY'S GAME OF LIFE</div>
  <div id="paused-overlay"><span>PAUSED</span></div>
  <div id="legend"></div>
  <div id="click-hint">CLICK CANVAS TO SEED ORGANISMS</div>
</div>

<script src="./simulator.js"></script>
<script src="./ant_colony.js"></script>
<script src="./conway_life.js"></script>
<script src="./preditor_prey.js"></script>
<script src="./boids.js"></script>
<script src="./genetic.js"></script>
</body>
</html>
