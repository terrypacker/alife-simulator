<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALIFE — Artificial Life Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://terrypacker.com/assets/css/base.css" />
  <link rel="stylesheet" href="https://terrypacker.com/assets/css/theme-neon.css" />

  <link href="./assets/css/alife-styles.css" rel="stylesheet" />
</head>
<body>

<header>
  <h1>ALIFE</h1>
  <div class="tag">ARTIFICIAL LIFE SIMULATOR</div>
  <div class="tag">v1.0</div>
  <div class="header-stats">
    <div>GEN <span id="stat-gen">0</span></div>
    <div>POP <span id="stat-pop">0</span></div>
    <div>FPS <span id="stat-fps">0</span></div>
  </div>
</header>

<div id="panel">

  <!-- Algorithm Selector -->
  <div class="section">
    <div class="section-title">ALGORITHM</div>
    <div class="algo-list" id="algo-list"></div>
  </div>

  <!-- Transport -->
  <div class="section">
    <div class="section-title">TRANSPORT</div>
    <div class="transport" style="margin-bottom:10px">
      <button class="btn primary" id="btn-play">▶ PLAY</button>
      <button class="btn" id="btn-step">STEP</button>
      <button class="btn danger" id="btn-reset">RESET</button>
    </div>
    <div class="param-row">
      <div class="param-label">SPEED <span class="val" id="speed-val">10</span> fps</div>
      <input type="range" id="speed-slider" min="1" max="60" value="10" />
    </div>
  </div>

  <!-- Global params (always shown) -->
  <div class="param-group">
    <div class="section-title">WORLD</div>
    <div class="param-row">
      <div class="param-label">POPULATION <span class="val" id="pop-val">150</span></div>
      <input type="range" id="pop-slider" min="10" max="500" value="150" />
    </div>
  </div>

  <!-- Dynamic algo params injected here -->
  <div id="algo-params"></div>

</div>

<!-- Canvas viewport -->
<div id="canvas-wrap">
  <canvas id="bg-canvas"></canvas>
  <canvas id="main-canvas"></canvas>
  <div id="algo-badge">CONWAY'S GAME OF LIFE</div>
  <div id="paused-overlay"><span>PAUSED</span></div>
  <div id="legend"></div>
  <div id="click-hint">CLICK CANVAS TO SEED ORGANISMS</div>
</div>

<script src="./assets/js/simulator.js"></script>
<script src="./assets/js/ant_colony.js"></script>
<script src="./assets/js/conway_life.js"></script>
<script src="./assets/js/preditor_prey.js"></script>
<script src="./assets/js/boids.js"></script>
<script src="./assets/js/genetic.js"></script>
</body>
</html>
